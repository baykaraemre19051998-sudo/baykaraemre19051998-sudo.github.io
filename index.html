<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensiz Geçen Zaman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffa36c, #ffd166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #a9a9a9;
            font-style: italic;
        }
        
        .countdown-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }
        
        .time-unit {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px 15px;
            min-width: 130px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }
        
        .time-unit:hover {
            transform: translateY(-5px);
        }
        
        .time-value {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #64dfdf, #80ffdb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(100, 223, 223, 0.5);
            line-height: 1;
        }
        
        .time-label {
            font-size: 1.1rem;
            margin-top: 10px;
            color: #c0c0c0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .separator {
            font-size: 3rem;
            color: #ff6b6b;
            display: flex;
            align-items: center;
            font-weight: bold;
            margin: 0 5px;
        }
        
        .date-info {
            font-size: 1.1rem;
            margin: 30px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            color: #ddd;
        }
        
        .heart {
            color: #ff6b6b;
            font-size: 2rem;
            animation: heartbeat 1.5s infinite;
            margin: 0 10px;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px;
                max-width: 95%;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .countdown-container {
                gap: 15px;
            }
            
            .time-unit {
                min-width: 110px;
                padding: 15px 10px;
            }
            
            .time-value {
                font-size: 2.5rem;
            }
            
            .time-label {
                font-size: 1rem;
            }
            
            .separator {
                display: none;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .countdown-container {
                gap: 10px;
            }
            
            .time-unit {
                min-width: 85px;
                padding: 12px 5px;
            }
            
            .time-value {
                font-size: 2rem;
            }
            
            .time-label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sensiz Geçen Zaman</h1>
        <p class="subtitle">16 Kasım 2025'ten beri her saniye seni düşünüyorum...</p>
        
        <div class="countdown-container">
            <div class="time-unit">
                <div class="time-value" id="years">0</div>
                <div class="time-label">Yıl</div>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-unit">
                <div class="time-value" id="months">0</div>
                <div class="time-label">Ay</div>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-unit">
                <div class="time-value" id="days">0</div>
                <div class="time-label">Gün</div>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-unit">
                <div class="time-value" id="hours">00</div>
                <div class="time-label">Saat</div>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-unit">
                <div class="time-value" id="minutes">00</div>
                <div class="time-label">Dakika</div>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-unit">
                <div class="time-value" id="seconds">00</div>
                <div class="time-label">Saniye</div>
            </div>
        </div>
        
        <div class="date-info">
            <p>Sen gideli: <span id="start-date">16 Kasım 2025, 00:00</span></p>
            <p>Şu an: <span id="current-date">Yükleniyor...</span></p>
            <p>Toplam saniye: <span id="total-seconds">0</span></p>
        </div>
        
        <div class="footer">
            <p>Bu sayaç, sensiz geçen her anı sayar <span class="heart">♥</span></p>
            <p style="margin-top: 10px; font-size: 0.8rem; color: #666;">Her saniye güncellenir</p>
        </div>
    </div>

    <script>
        // 16 Kasım 2025, saat 00:00:00'dan itibaren saymaya başlayacak
        // JavaScript'te aylar 0-11 arasıdır (0=Ocak, 10=Kasım)
        const startDate = new Date(2025, 10, 16, 0, 0, 0);
        
        function updateCounter() {
            const now = new Date();
            const timeDiff = now - startDate;
            
            // Eğer henüz 16 Kasım 2025 gelmediyse, sıfır göster
            if (timeDiff < 0) {
                document.getElementById('years').textContent = '0';
                document.getElementById('months').textContent = '0';
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('total-seconds').textContent = '0';
                return;
            }
            
            // Toplam saniye
            const totalSeconds = Math.floor(timeDiff / 1000);
            
            // Yıllar
            const years = Math.floor(totalSeconds / (365.25 * 24 * 60 * 60));
            
            // Aylar (kalan süreden)
            const remainingAfterYears = totalSeconds - (years * 365.25 * 24 * 60 * 60);
            const months = Math.floor(remainingAfterYears / (30.44 * 24 * 60 * 60));
            
            // Günler (kalan süreden)
            const remainingAfterMonths = remainingAfterYears - (months * 30.44 * 24 * 60 * 60);
            const days = Math.floor(remainingAfterMonths / (24 * 60 * 60));
            
            // Saatler (kalan süreden)
            const remainingAfterDays = remainingAfterMonths - (days * 24 * 60 * 60);
            const hours = Math.floor(remainingAfterDays / (60 * 60));
            
            // Dakikalar (kalan süreden)
            const remainingAfterHours = remainingAfterDays - (hours * 60 * 60);
            const minutes = Math.floor(remainingAfterHours / 60);
            
            // Saniyeler (kalan)
            const seconds = Math.floor(remainingAfterHours - (minutes * 60));
            
            // Değerleri güncelle (saat, dakika, saniye 2 haneli olacak)
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            document.getElementById('total-seconds').textContent = totalSeconds.toLocaleString('tr-TR');
            
            // Tarih bilgilerini güncelle
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('current-date').textContent = now.toLocaleDateString('tr-TR', options);
        }
        
        // Sayfa yüklendiğinde ve her saniye sayaç güncellensin
        document.addEventListener('DOMContentLoaded', () => {
            updateCounter();
            // Her saniye güncelle (1000 ms = 1 saniye)
            setInterval(updateCounter, 1000);
            
            // Başlangıç tarihini göster
            const startOptions = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            };
            document.getElementById('start-date').textContent = startDate.toLocaleDateString('tr-TR', startOptions);
        });
    </script>
</body>
</html>
