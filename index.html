<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>🚑 Acil Nöbet Analizi</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #000; margin: 0; overflow-x: hidden; color: white; }
        
        /* Ambulans Animasyonu */
        .ambulance-anim { position: absolute; font-size: 40px; animation: move 5s linear infinite; top: 10%; z-index: 0; }
        @keyframes move { from { left: -100px; } to { left: 110%; } }
        
        .container { position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: rgba(255, 255, 255, 0.95); color: #333; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; border: 5px solid #ffcc00; box-shadow: 0 0 20px #ff0000; }
        
        button { background: #d32f2f; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        label { display: block; background: #eee; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; text-align: left; }
        label:hover { background: #ddd; }
    </style>
</head>
<body>

    <div class="ambulance-anim">🚑</div>
    <div class="ambulance-anim" style="top: 80%; animation-delay: 2s;">🚑</div>

    <div class="container">
        <div class="box" id="mainBox">
            <div id="content">
                <h1>Işıl'ın 27 Yaş Analizi</h1>
                <p id="soruText"></p>
                <div id="siklar"></div>
                <button onclick="cevapla()">İleri →</button>
            </div>
            <div id="surpriz" style="display:none;">
                <h2>🎉 27. YAŞIN KUTLU OLSUN IŞIL!</h2>
                <p>Anket bitti! Emre'nin sürprizi: Nöbetteki ilk çay senden değil, benden!</p>
            </div>
        </div>
    </div>

    <script>
        const sorular = [...]; // (Önceki mesajdaki soruların aynısı)
        const secenekler = [...]; // (Önceki mesajdaki seçeneklerin aynısı)
        
        let currentStep = 0;
        let cevaplar = []; // Işıl'ın cevaplarını burada tutuyoruz

        function render() {
            document.getElementById('soruText').innerText = sorular[currentStep];
            let html = "";
            secenekler[currentStep].forEach((s, j) => {
                html += `<label><input type="radio" name="q" value="${s}"> ${s}</label>`;
            });
            document.getElementById('siklar').innerHTML = html;
        }

        function cevapla() {
            const selected = document.querySelector('input[name="q"]:checked');
            if (!selected) { alert("Işıl, seçim yapmalısın!"); return; }
            
            cevaplar.push(selected.value);
            console.log("Işıl şunu işaretledi:", selected.value); // F12 -> Console kısmında senin görebilmen için
            
            currentStep++;
            if (currentStep < sorular.length) { render(); } 
            else { 
                document.getElementById('content').style.display = 'none';
                document.getElementById('surpriz').style.display = 'block';
                localStorage.setItem('isilinCevaplari', JSON.stringify(cevaplar));
                alert("Anket bitti! Emre sonuçları 'LocalStorage' üzerinden görebilir.");
            }
        }
        render();
    </script>
</body>
</html>
