<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Paramedik Analiz Aracı</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #e0e0e0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
        }
        /* Ambulans Kasası */
        .container { 
            background: #ffffff; 
            width: 90%; max-width: 500px; 
            padding: 30px; 
            border-radius: 20px; 
            border: 8px solid #d32f2f; /* Kırmızı Şerit */
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }
        /* Tepe Lambası Efekti */
        .container::before {
            content: "🚑"; font-size: 50px; display: block; margin-bottom: 10px;
        }
        h1 { color: #003366; font-size: 20px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 3px solid #ffcc00; }
        
        input[type="text"] { width: 80%; padding: 12px; border: 2px solid #003366; border-radius: 8px; margin-bottom: 20px; }
        
        .question { font-size: 18px; font-weight: bold; color: #333; margin: 20px 0; }
        
        label { 
            display: block; background: #fdfdfd; padding: 15px; margin: 10px 0; 
            border: 2px solid #ccc; border-radius: 10px; text-align: left; transition: 0.3s;
        }
        label:hover { background: #fff5f5; border-color: #d32f2f; }
        
        button { 
            background: #d32f2f; color: white; padding: 12px 30px; border: none; 
            border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        
        .step { display: none; }
        .active { display: block; }
        
        #cevapOzeti { text-align: left; font-size: 14px; background: #eee; padding: 15px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. Adım: Giriş -->
        <div id="loginStep" class="step active">
            <h1>Paramedik Veri Girişi</h1>
            <input type="text" id="userName" placeholder="İsim Soyisim...">
            <br><button onclick="login()">Sisteme Giriş Yap</button>
        </div>

        <!-- 2. Adım: Anket -->
        <div id="surveyStep" class="step">
            <div id="soruBaslik" class="question"></div>
            <div id="siklar"></div>
        </div>

        <!-- 3. Adım: Sonuç -->
        <div id="resultStep" class="step">
            <h2 id="mesaj"></h2>
            <div id="cevapOzeti"></div>
            <br><button onclick="location.reload()">Yeni Kayıt</button>
        </div>
    </div>

    <script>
        const sorular = [
            "1. Emre nöbeti devralınca ilk ne yapmalı?",
            "2. Ambulansta en çok neyi özlüyorsun?",
            "3. Emre'yi tek kelimeyle tanımla:"
        ]; // Emre, buraya 20 soruyu kendi listenden tamamlarsın.
        
        const secenekler = [
            ["Çay demlemeli", "Sirenleri kontrol etmeli", "Sessizce oturmalı"],
            ["Kahve molası", "Boş yollar", "Hiçbir şey"],
            ["Komik", "Boşboğaz", "Çalışkan"]
        ];

        let currentUser = "";
        let currentStep = 0;
        let userAnswers = {};

        function login() {
            currentUser = document.getElementById('userName').value;
            if(!currentUser) return alert("İsimsiz vaka kabul edilmiyor!");
            
            // Eğer daha önce doldurduysa direkt göster
            let saved = localStorage.getItem(currentUser);
            if(saved) {
                userAnswers = JSON.parse(saved);
                showResult();
            } else {
                document.getElementById('loginStep').classList.remove('active');
                document.getElementById('surveyStep').classList.add('active');
                renderQuestion();
            }
        }

        function renderQuestion() {
            document.getElementById('soruBaslik').innerText = sorular[currentStep];
            let h = "";
            secenekler[currentStep].forEach(s => h += `<label><input type="radio" name="q" value="${s}"> ${s}</label>`);
            document.getElementById('siklar').innerHTML = h + `<button onclick="next()">İleri</button>`;
        }

        function next() {
            let val = document.querySelector('input[name="q"]:checked')?.value;
            if(!val) return alert("Seçim yapmadan çıkış yasak!");
            userAnswers[sorular[currentStep]] = val;
            currentStep++;
            if(currentStep < sorular.length) renderQuestion();
            else finish();
        }

        function finish() {
            localStorage.setItem(currentUser, JSON.stringify(userAnswers));
            showResult();
        }

        function showResult() {
            document.getElementById('loginStep').classList.remove('active');
            document.getElementById('surveyStep').classList.remove('active');
            document.getElementById('resultStep').classList.add('active');
            document.getElementById('mesaj').innerText = currentUser + " - Kayıtlı Veriler:";
            let html = "";
            for(let q in userAnswers) html += `<p><strong>${q}</strong><br><em>${userAnswers[q]}</em></p>`;
            document.getElementById('cevapOzeti').innerHTML = html;
        }
    </script>
</body>
</html>
